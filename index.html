<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sulav Pariyar — Personal Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Base Cyberpunk Theme (Default) */
      --bg-base: #071026;
      --accent-c: #00f0e6; /* Cyan */
      --accent-p: #a78bfa; /* Purple */
      --muted: #9aa7bf;
      --card-radius: 24px;
      /* Adjusted for better contrast while remaining transparent */
      --glass-bg: rgba(7, 16, 38, 0.35);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Midnight Forest Theme */
    body.theme-forest {
      --bg-base: #03120f;
      --accent-c: #52b788;
      --accent-p: #2d6a4f;
      --glass-bg: rgba(3, 18, 15, 0.4);
    }

    /* Sunset Theme */
    body.theme-sunset {
      --bg-base: #1a0b10;
      --accent-c: #ffb26b;
      --accent-p: #ff7b54;
      --glass-bg: rgba(26, 11, 16, 0.4);
    }

    /* Deep Ocean Theme */
    body.theme-ocean {
      --bg-base: #010a15;
      --accent-c: #90e0ef;
      --accent-p: #0077b6;
      --glass-bg: rgba(1, 10, 21, 0.4);
    }

    html, body {
      height: 100%;
      margin: 0;
      background-color: transparent; 
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* === LIVE INTERACTIVE CANVAS BACKGROUND === */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: -20;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background-color: var(--bg-base);
      /* Added opacity to the transition for smooth theme switching */
      transition: background-color 1s ease, opacity 0.4s ease;
    }

    /* Vignette overlay - NO BLUR here so the canvas pops */
    .bg-dim {
      position: fixed;
      inset: 0;
      z-index: -10;
      background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
    }

    /* === THEME TOGGLE === */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(-20px);
    }
    .layout.visible ~ .theme-toggle {
      opacity: 1;
      transform: translateY(0);
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.1) rotate(15deg);
      border-color: var(--accent-c);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* === LAYOUT === */
    .layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .layout.visible { opacity: 1; transform: translateY(0); }

    /* === OVERLAY === */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(3, 6, 12, 0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      color: #fff;
      font-weight: 700;
      font-size: 28px;
      user-select: none;
      transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
    }
    #overlay.fade-out { opacity: 0; backdrop-filter: blur(0px); pointer-events: none; }
    #overlay canvas { position: absolute; inset: 0; pointer-events: none; }

    .enter-btn {
      margin-top: 24px;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      border-color: var(--accent-c);
    }

    .panel-wrap {
      width: 980px;
      max-width: 96%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: stretch;
      perspective: 2000px;
    }

    /* === GLASSMORPHISM CARDS (UPDATED) === */
    .glass-panel {
      background: var(--glass-bg);
      border-radius: var(--card-radius);
      /* Increased border opacity for a crisper edge */
      border: 1px solid rgba(255, 255, 255, 0.2); 
      /* Deeper drop shadow for elevation + inner light rim */
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 2px 2px rgba(255, 255, 255, 0.15);
      /* Increased blur and saturation to make the text highly readable */
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out, background 1s ease, border-color 0.5s ease;
      position: relative;
    }

    /* Ensure UI elements transition smoothly with themes */
    .badge, .name, .subcard, .social-row a, .tagline {
      transition: all 0.5s ease !important; 
    }

    .info-card { display: flex; gap: 30px; padding: 32px; z-index: 10; }
    .left { width: 200px; flex: 0 0 200px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .avatar {
      width: 160px; height: 160px;
      border-radius: 50%; overflow: hidden;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .avatar:hover {
      transform: scale(1.05) translateZ(50px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.8), inset 0 0 0 2px var(--accent-c);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 50%; }
    .avatar canvas { position: absolute; inset: 0; pointer-events: none; border-radius: 50%; mix-blend-mode: screen; }

    .right { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
    .name-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    
    .name {
      font-family: "Montserrat", sans-serif;
      font-weight: 900;
      font-size: 38px; letter-spacing: 1px;
      background: linear-gradient(to right, var(--accent-c), #ffffff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; white-space: nowrap;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .tagline { color: var(--muted); font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }

    .badges { display: flex; gap: 8px; align-items: center; }
    .badge {
      display: inline-grid; place-items: center; border-radius: 8px;
      font-size: 12px; font-weight: 800; color: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
    }
    .badge:hover { transform: translateY(-2px); }
    .badge.cyan { background: linear-gradient(135deg, var(--accent-c), #ffffff); color: #000; }
    .badge.purple { background: linear-gradient(135deg, var(--accent-p), #ffffff); color: #000; }

    .subcards { display: flex; gap: 16px; margin-top: 16px; }
    .subcard {
      flex: 1; padding: 16px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); display: flex; gap: 14px; align-items: center;
    }
    .subcard:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }
    .subcard .icon {
      width: 52px; height: 52px; border-radius: 12px; overflow: hidden;
      display: grid; place-items: center; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    }
    .subcard .title { font-weight: 800; color: #fff; font-size: 15px; }
    .subcard .desc { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .social-row { display: flex; justify-content: flex-start; gap: 16px; margin-top: 20px; align-items: center; }
    .social-row a {
      width: 44px; height: 44px; display: inline-grid; place-items: center;
      border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); text-decoration: none; color: inherit;
    }
    .social-row a:hover {
      transform: translateY(-6px) scale(1.05); background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent-c); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
    }

    /* === MUSIC PANEL === */
    .music-wrap { display: flex; align-items: center; gap: 18px; padding: 18px 24px; z-index: 10; }
    .music-thumb {
      width: 70px; height: 70px; border-radius: 12px; overflow: hidden; flex: 0 0 70px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); cursor: pointer; transition: transform 0.3s ease;
    }
    .music-thumb:hover { transform: scale(1.05) rotate(2deg); }
    .music-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .music-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .music-title { font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 0.5px; }
    .controls { display: flex; align-items: center; gap: 14px; }
    
    .control-btn {
      width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease; color: #fff;
    }
    .control-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); }
    .control-btn.playing {
      background: linear-gradient(135deg, var(--accent-c), var(--accent-p));
      border-color: transparent; color: #021022; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
    }

    .big-progress { height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 999px; position: relative; cursor: pointer; }
    .big-progress .fill {
      height: 100%; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-c), var(--accent-p));
      box-shadow: 0 0 12px rgba(255,255,255,0.3); transition: background 0.5s ease;
    }
    .big-progress .dot {
      position: absolute; top: 50%; left: 0; width: 14px; height: 14px;
      transform: translate(-50%, -50%); border-radius: 50%; background: white;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); transition: transform 0.1s ease;
    }
    .big-progress:hover .dot { transform: translate(-50%, -50%) scale(1.3); }

    .time-row { display: flex; align-items: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: color 0.5s ease; }
    .volume-wrap {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 12px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--accent-c); transition: color 0.5s ease;
    }
    .volume-wrap input[type=range] { width: 100px; height: 6px; -webkit-appearance: none; background: rgba(255, 255, 255, 0.15); border-radius: 999px; outline: none; }
    .volume-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6); cursor: pointer; }

    /* === CUSTOM CURSOR === */
    body.hide-default-cursor { cursor: none; }
    .cursor-dot {
      position: fixed; left: 0; top: 0; width: 24px; height: 24px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent-c) 40%, transparent 80%);
      pointer-events: none; transform: translate(-50%, -50%);
      z-index: 99999; mix-blend-mode: screen; display: none; transition: background 0.5s ease;
    }

    /* Responsive */
    @media (max-width:900px) {
      .info-card { flex-direction: column; align-items: center; padding: 24px; }
      .left { width: 100%; order: 0; flex-direction: row; justify-content: center; }
      .right { width: 100%; text-align: center; }
      .social-row { justify-content: center; }
      .name-wrap { justify-content: center; }
      .subcards { flex-direction: column; }
      .music-wrap { flex-direction: column; align-items: stretch; text-align: center; }
      .controls { justify-content: center; }
      .volume-wrap { justify-content: center; }
      .theme-toggle { top: 15px; right: 15px; width: 40px; height: 40px; }
    }
  </style>
</head>

  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    // Global Mouse Tracking for Parallax, Cursor & Background Interaction
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let targetX = 0, targetY = 0;
    let isClicking = false;
    window.addEventListener('mousemove', e => { 
      mouseX = e.clientX; 
      mouseY = e.clientY; 
      targetX = (e.clientX / window.innerWidth - 0.5) * 2; 
      targetY = (e.clientY / window.innerHeight - 0.5) * 2;
    }, { passive: true });
    window.addEventListener('mousedown', () => isClicking = true);
    window.addEventListener('mouseup', () => isClicking = false);

    /* ===== LIVE INTERACTIVE THEME ENGINE ===== */
    (function initInteractiveThemes() {
      const themes = ['', 'theme-forest', 'theme-sunset', 'theme-ocean'];
      let currentThemeIndex = 0;
      const canvas = $('#bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let elements = [];

      // A robust way to fetch actual rendered CSS colors to pass into Canvas
      const getThemeColors = () => {
        const body = document.body;
        const temp = document.createElement('div');
        temp.style.color = 'var(--accent-c)';
        temp.style.backgroundColor = 'var(--accent-p)';
        body.appendChild(temp);
        
        const styles = getComputedStyle(temp);
        const parseRgb = (str) => {
          const match = str.match(/\d+/g);
          return match ? [parseInt(match[0]), parseInt(match[1]), parseInt(match[2])] : [255, 255, 255];
        };
        
        const colors = {
          c: parseRgb(styles.color),
          p: parseRgb(styles.backgroundColor)
        };
        body.removeChild(temp);
        return colors;
      };

      class BaseDesign {
        constructor() { this.init(); }
        init() { this.x = Math.random() * w; this.y = Math.random() * h; this.colorType = Math.random() > 0.5 ? 'c' : 'p'; }
        update() { this.autonomousFloat(); this.mouseRepel(); }
        draw() {}
        autonomousFloat() {}
        mouseRepel() {
          const dx = mouseX - this.x;
          const dy = mouseY - this.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 300) { this.x -= (dx/dist)*2; this.y -= (dy/dist)*2; }
        }
      }

      // Design 1: Interactive Particle Mesh 
      class ParticleMesh extends BaseDesign {
        init() { super.init(); this.r = Math.random() * 3 + 1.5; this.vx = (Math.random()-0.5)*1.5; this.vy = (Math.random()-0.5)*1.5; }
        autonomousFloat() { this.x += this.vx; this.y += this.vy; if (this.x<0||this.x>w) this.vx*=-1; if (this.y<0||this.y>h) this.vy*=-1; }
        draw(colors) {
          ctx.beginPath();
          const rgb = colors[this.colorType];
          ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 1)`;
          ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // Design 2: Shifting Live Waves
      class LiveWaves extends BaseDesign {
        init() { super.init(); this.phase = Math.random()*Math.PI*2; this.baseY = this.y; }
        update() { this.phase += 0.02; this.mouseRepel(); }
        draw(colors) {
          ctx.beginPath();
          const rgb = colors[this.colorType];
          ctx.strokeStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.5)`;
          ctx.lineWidth = 3;
          ctx.moveTo(0, this.baseY + Math.sin(this.phase) * 30);
          for (let i = 1; i < w; i += 4) {
            const y = this.baseY + Math.sin(this.phase + i * 0.01) * 30;
            ctx.lineTo(i, y + Math.cos(i*0.005 + this.phase*0.2)*20);
          }
          ctx.stroke();
        }
      }

      // Design 3: Interactive Leaves
      class InteractiveLeaves extends BaseDesign {
        init() { super.init(); this.r = Math.random()*12+6; this.vx = (Math.random()-0.5)*1.5; this.vy = Math.random()*2+1; this.angle = Math.random()*Math.PI*2; }
        autonomousFloat() { this.x += this.vx; this.y += this.vy; this.angle += 0.01; if (this.y > h + this.r) { this.y = -this.r; this.x = Math.random()*w; } }
        draw(colors) {
          ctx.beginPath();
          const rgb = colors[this.colorType];
          ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.8)`;
          ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
          ctx.ellipse(0, 0, this.r, this.r*0.6, 0, 0, Math.PI*2);
          ctx.fill(); ctx.restore();
        }
      }

      function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; initializeElements(); }
      window.addEventListener('resize', resize);
      
      function initializeElements() {
        const theme = themes[currentThemeIndex];
        elements = [];
        let ClassToUse, count;
        if (theme === 'theme-sunset') { ClassToUse = LiveWaves; count = 12; }
        else if (theme === 'theme-forest') { ClassToUse = InteractiveLeaves; count = 50; }
        else { ClassToUse = ParticleMesh; count = 130; } 

        elements = Array.from({length: count}, () => new ClassToUse());
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);
        const colors = getThemeColors();

        elements.forEach((el) => { el.update(); el.draw(colors); });
        
        // Draw mesh connection lines
        if (elements[0] instanceof ParticleMesh) {
          ctx.lineWidth = 1;
          const rgb = colors.c; // Match primary accent color
          ctx.strokeStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.3)`;
          for (let i = 0; i < elements.length; i++) {
            for (let j = i + 1; j < elements.length; j++) {
              const dx = elements[i].x - elements[j].x;
              const dy = elements[i].y - elements[j].y;
              const dist = Math.sqrt(dx*dx+dy*dy);
              if (dist < 180) { 
                ctx.beginPath();
                ctx.moveTo(elements[i].x, elements[i].y); 
                ctx.lineTo(elements[j].x, elements[j].y); 
                ctx.stroke(); 
              }
            }
          }
        }
        requestAnimationFrame(animate);
      }

      resize(); animate(); 

      /* === UPDATED THEME TOGGLE ANIMATION === */
      $('#themeToggle').addEventListener('click', () => {
        const bgCanvas = $('#bgCanvas');
        
        // Fade out canvas
        bgCanvas.style.opacity = '0';
        
        setTimeout(() => {
          // Swap the theme classes
          document.body.className = document.body.className.replace(/theme-\w+/g, '').trim();
          currentThemeIndex = (currentThemeIndex + 1) % themes.length;
          if (themes[currentThemeIndex]) document.body.classList.add(themes[currentThemeIndex]);
          
          if($('#overlay').classList.contains('fade-out')) document.body.classList.add('hide-default-cursor');
          
          // Generate new particles/waves for the active theme
          initializeElements(); 
          
          // Fade canvas back in
          bgCanvas.style.opacity = '1';
        }, 400); // Wait for CSS opacity transition to complete
      });
    })();

    /* ===== OVERLAY & INIT ===== */
    (function initOverlay() {
      const overlay = $('#overlay');
      const enterBtn = $('#enterBtn');
      const layout = $('#mainLayout');
      const canvas = $('#snowCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, raf;
      
      function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; flakes.forEach(f => {f.x=Math.random()*w; f.y=Math.random()*h;}); }
      
      const flakes = Array.from({length: 120}, () => ({
        x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 1, dy: Math.random() * 1 + 0.5,
        dx: (Math.random() - 0.5) * 0.5, a: Math.random() * 0.5 + 0.2
      }));
      resize(); window.addEventListener('resize', resize);

      function drawSnow() {
        ctx.clearRect(0, 0, w, h); 
        flakes.forEach(f => { f.x+=f.dx; f.y+=f.dy; if(f.y>h)f.y=-10; if(f.x>w)f.x=0; else if(f.x<0)f.x=w; ctx.beginPath(); ctx.fillStyle=`rgba(255,255,255,${f.a})`; ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill(); });
        raf = requestAnimationFrame(drawSnow);
      }
      drawSnow();
      
      enterBtn.addEventListener('click', () => {
        $('#audio').play().catch(() => {});
        overlay.classList.add('fade-out');
        document.body.classList.add('hide-default-cursor');
        layout.classList.add('visible'); 
        setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0, 0, w, h); }, 800);
      });
    })();

    /* ===== CUSTOM CURSOR ===== */
    (function initCursor() {
      const dot = $('#cursorDot');
      let x = mouseX, y = mouseY;
      
      const obs = new MutationObserver(() => { 
        if ($('#overlay').classList.contains('fade-out')) dot.style.display = 'block'; 
      });
      obs.observe($('#overlay'), { attributes: true });

      function loop() {
        x += (mouseX - x) * 0.2; 
        y += (mouseY - y) * 0.2;
        dot.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        const targetScale = isClicking ? 0.7 : 1;
        dot.style.transform += ` scale(${targetScale})`;
        requestAnimationFrame(loop);
      }
      loop();
    })();

    /* ===== SMOOTH PARALLAX ===== */
    (function initParallax() {
      const card = $('#infoCard');
      const music = $('#musicWrap');
      const avatar = $('#avatar');
      let cx = 0, cy = 0;

      function animateParallax() {
        cx += (targetX - cx) * 0.1; 
        cy += (targetY - cy) * 0.1;
        if (card) card.style.transform = `perspective(2000px) translate3d(${cx * 20}px, ${cy * 15}px, 0) rotateX(${-cy * 6}deg) rotateY(${cx * 6}deg)`;
        if (music) music.style.transform = `perspective(2000px) translate3d(${cx * 15}px, ${cy * 10}px, 0) rotateX(${-cy * 3}deg) rotateY(${cx * 3}deg)`;
        if (avatar) avatar.style.transform = `translate3d(${cx * 15}px, ${cy * 15}px, 60px) rotate(${cx * 10}deg)`;
        requestAnimationFrame(animateParallax);
      }
      animateParallax();
    })();

    /* ===== TYPEWRITER ===== */
    (function initTypewriter() {
      const el = $('#displayName');
      const names = ["Sulav Pariyar"];
      let ci = 0, forward = true;
      function step() {
        const cur = names[0];
        if (forward) { el.textContent = cur.slice(0, ++ci); if (ci >= cur.length) { forward = false; setTimeout(step, 2000); return; } setTimeout(step, 100 + Math.random() * 50); }
        else { el.textContent = cur.slice(0, --ci); if (ci <= 0) { forward = true; setTimeout(step, 500); return; } setTimeout(step, 50 + Math.random() * 30); }
      }
      step();
    })();

    /* ===== AVATAR PARTICLES ===== */
    (function initAvatarParticles() {
      const canvas = $('#avatarParticles'); const avatar = $('#avatar');
      if (!canvas || !avatar) return;
      const ctx = canvas.getContext('2d');
      let w = canvas.width = avatar.clientWidth; let h = canvas.height = avatar.clientHeight;
      const particles = Array.from({length: 50}, () => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5 + 0.5, dx: (Math.random() - 0.5) * 0.8, dy: (Math.random() - 0.5) * 0.8, a: Math.random() * 0.6 + 0.2 }));
      function anim() {
        ctx.clearRect(0, 0, w, h); ctx.save(); ctx.beginPath(); ctx.arc(w/2, h/2, w/2, 0, Math.PI*2); ctx.clip();
        const accentStr = getComputedStyle(document.body).getPropertyValue('--accent-p').trim();
        particles.forEach(p => { 
          p.x += p.dx; p.y += p.dy; 
          const distSq = (p.x - w/2)**2 + (p.y - h/2)**2; 
          if (distSq > (w/2)**2) { 
            const ang = Math.atan2(h/2 - p.y, w/2 - p.x); 
            p.x = w/2 + Math.cos(ang) * (w/2 - 2);
            p.y = h/2 + Math.sin(ang) * (h/2 - 2); 
          } 
          ctx.beginPath(); ctx.fillStyle = accentStr; ctx.globalAlpha = p.a;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; 
        });
        ctx.restore(); requestAnimationFrame(anim);
      }
      anim();
    })();

    /* ===== MUSIC PLAYER ===== */
    (function initMusic() {
      const audio = $('#audio'), playToggle = $('#playToggle'), playIcon = $('#playIcon'), progressFill = $('#progressFill'), progressDot = $('#progressDot'), progressBar = $('#progressBar'), currentTime = $('#currentTime'), totalTime = $('#totalTime'), vol = $('#volumeRange'), thumb = $('#thumbImg'), skipBack = $('#skipBack'), skipForward = $('#skipForward');
      audio.volume = Number(vol.value);
      const fmt = s => isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
      audio.addEventListener('loadedmetadata', () => totalTime.textContent = fmt(audio.duration));
      audio.addEventListener('timeupdate', () => { 
        if (!audio.duration) return; 
        const pct = (audio.currentTime / audio.duration) * 100; 
        progressFill.style.width = pct + '%'; 
        progressDot.style.left = pct + '%'; 
        currentTime.textContent = fmt(audio.currentTime); 
      });
      progressBar.addEventListener('click', e => { 
        const rect = progressBar.getBoundingClientRect();
        if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
      });
      function setPlaying(on) { 
        if (on) { 
          playToggle.classList.add('playing');
          playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/>'; 
        } else { 
          playToggle.classList.remove('playing'); 
          playIcon.innerHTML = '<path d="M5 3v18l15-9L5 3z" fill="currentColor"/>';
        } 
      }
      playToggle.addEventListener('click', () => audio.paused ? (audio.play().catch(()=>{}), setPlaying(true)) : (audio.pause(), setPlaying(false)));
      audio.addEventListener('play', () => setPlaying(true)); 
      audio.addEventListener('pause', () => setPlaying(false)); 
      audio.addEventListener('ended', () => setPlaying(false));
      vol.addEventListener('input', e => audio.volume = Number(e.target.value));
      thumb.addEventListener('click', () => { const url = prompt('Enter thumbnail URL (e.g. assets/new.jpg):', thumb.src); if (url) thumb.src = url; });
      skipBack.addEventListener('click', () => audio.currentTime = Math.max(0, audio.currentTime - 10)); 
      skipForward.addEventListener('click', () => audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10));
    })();
  </script>
</body>
