<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sulav Pariyar — Personal Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #071026;
      --bg-2: #0f1724;
      --accent-c: #00f0e6;
      --accent-p: #a78bfa;
      --muted: #9aa7bf;
      --card-radius: 24px;
      --glass-bg: rgba(15, 23, 36, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Base */
   html, body {
  height: 100%;
  margin: 0;
  background-color: #071026; /* Set a solid base color */
  /* Remove any background-image from here so it doesn't cover the video layer */
  overflow: hidden;
}

    /* === BACKGROUND & VIDEO FIX === */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -20;
      overflow: hidden;
    }

    /* Liquid Gradient Fallback / Base */
    .liquid-bg {
      position: absolute;
      inset: -50%;
      background: linear-gradient(45deg, #071026, #1a0b2e, #001f3f, #071026);
      background-size: 400% 400%;
      animation: fluidGlass 15s ease infinite;
      filter: blur(40px);
      z-index: 1;
    }

    @keyframes fluidGlass {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fixed MP4 Looping Background */
    #bgVid {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  opacity: 0.8; /* Adjusted for better visibility through the glass */
}

    .bg-dim {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: linear-gradient(180deg, rgba(3, 6, 12, 0.4), rgba(2, 6, 10, 0.7));
      backdrop-filter: blur(12px); /* Modern frosted glass effect over the background */
      -webkit-backdrop-filter: blur(12px);
      pointer-events: none;
    }

    /* === LAYOUT === */
    .layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .layout.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(3, 6, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      font-weight: 700;
      font-size: 28px;
      user-select: none;
      transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
    }

    #overlay.fade-out {
      opacity: 0;
      backdrop-filter: blur(0px);
      pointer-events: none;
    }

    #overlay canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .enter-btn {
      margin-top: 24px;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      cursor: pointer;
      color: #e6f7ff;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 240, 230, 0.15);
      border-color: var(--accent-c);
    }

    .panel-wrap {
      width: 980px;
      max-width: 96%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: stretch;
      perspective: 1000px; /* For smoother 3D parallax */
    }

    /* === GLASSMORPHISM CARDS === */
    .glass-panel {
      background: var(--glass-bg);
      border-radius: var(--card-radius);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out; /* Smoothed parallax tracking */
      position: relative;
    }

    .info-card {
      display: flex;
      gap: 30px;
      padding: 32px;
      z-index: 10;
    }

    .left {
      width: 200px;
      flex: 0 0 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .avatar:hover {
      transform: scale(1.05) translateZ(20px);
      box-shadow: 0 20px 45px rgba(0, 240, 230, 0.2), inset 0 0 0 2px var(--accent-c);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    .avatar canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 50%;
      mix-blend-mode: screen;
    }

    .right {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .name-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .name {
      font-family: "Montserrat", sans-serif;
      font-weight: 900;
      font-size: 38px;
      letter-spacing: 1px;
      background: linear-gradient(to right, var(--accent-c), #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 8px 24px rgba(0, 240, 230, 0.2);
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .tagline {
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .badges {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      color: #031226;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }
    
    .badge:hover { transform: translateY(-2px); }

    .badge.cyan { background: linear-gradient(135deg, var(--accent-c), #30d6c6); }
    .badge.purple { background: linear-gradient(135deg, var(--accent-p), #825de6); color: #fff; }

    .subcards {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .subcard {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      display: flex;
      gap: 14px;
      align-items: center;
      transition: all 0.3s ease;
    }

    .subcard:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
    }

    .subcard .icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(43,42,74,0.6), rgba(107,45,143,0.6));
    }

    .subcard .title { font-weight: 800; color: #fff; font-size: 15px; }
    .subcard .desc { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .social-row {
      display: flex;
      justify-content: flex-start;
      gap: 16px;
      margin-top: 20px;
      align-items: center;
    }

    .social-row a {
      width: 44px;
      height: 44px;
      display: inline-grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-decoration: none;
      color: inherit;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .social-row a:hover {
      transform: translateY(-6px) scale(1.05);
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-c);
      box-shadow: 0 12px 24px rgba(0, 240, 230, 0.2);
    }

    /* === MUSIC PANEL === */
    .music-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 24px;
      z-index: 10;
    }

    .music-thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      overflow: hidden;
      flex: 0 0 70px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .music-thumb:hover { transform: scale(1.05) rotate(2deg); }

    .music-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .music-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .music-title { font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 0.5px; }

    .controls { display: flex; align-items: center; gap: 14px; }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }
    
    .control-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.1); }

    .control-btn.playing {
      background: linear-gradient(135deg, var(--accent-c), var(--accent-p));
      border-color: transparent;
      color: #021022;
      box-shadow: 0 6px 20px rgba(0, 240, 230, 0.3);
    }

    .big-progress {
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
    }

    .big-progress .fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-c), var(--accent-p));
      box-shadow: 0 0 10px rgba(0, 240, 230, 0.4);
    }

    .big-progress .dot {
      position: absolute;
      top: 50%;
      left: 0;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      transition: transform 0.1s ease;
    }
    
    .big-progress:hover .dot { transform: translate(-50%, -50%) scale(1.3); }

    .time-row {
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .volume-wrap input[type=range] {
      width: 100px;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
      outline: none;
    }

    .volume-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }

    /* === CUSTOM CURSOR === */
    body.hide-default-cursor { cursor: none; }

    .cursor-dot {
      position: fixed;
      left: 0; top: 0;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent-c) 40%, transparent 80%);
      box-shadow: 0 0 20px rgba(0, 240, 230, 0.4), 0 0 40px rgba(167, 139, 250, 0.2);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 99999;
      mix-blend-mode: screen;
      display: none;
    }

    /* Responsive */
    @media (max-width:900px) {
      .info-card { flex-direction: column; align-items: center; padding: 24px; }
      .left { width: 100%; order: 0; flex-direction: row; justify-content: center; }
      .right { width: 100%; text-align: center; }
      .social-row { justify-content: center; }
      .name-wrap { justify-content: center; }
      .subcards { flex-direction: column; }
      .music-wrap { flex-direction: column; align-items: stretch; text-align: center; }
      .controls { justify-content: center; }
      .volume-wrap { justify-content: center; }
    }
  </style>
</head>

  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    /* ===== OVERLAY & INIT ===== */
    (function initOverlay() {
      const overlay = $('#overlay');
      const enterBtn = $('#enterBtn');
      const layout = $('#mainLayout');
      const bgVid = $('#bgVid');
      
      // Snow Canvas
      const canvas = $('#snowCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, raf;
      
      function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      
      const flakes = Array.from({length: 120}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 2 + 1, dy: Math.random() * 1 + 0.5,
        dx: (Math.random() - 0.5) * 0.5, a: Math.random() * 0.5 + 0.2
      }));

      function drawSnow() {
        ctx.clearRect(0, 0, w, h);
        flakes.forEach(f => {
          f.x += f.dx; f.y += f.dy;
          if (f.y > h) { f.y = -10; f.x = Math.random() * w; }
          if (f.x > w) f.x = 0; else if (f.x < 0) f.x = w;
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${f.a})`;
          ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
          ctx.fill();
        });
        raf = requestAnimationFrame(drawSnow);
      }
      drawSnow();

      enterBtn.addEventListener('click', () => {
        // Audio & Video Playback logic fixed
        $('#audio').play().catch(() => {});
        if (bgVid) bgVid.play().catch(() => {}); 
        
        // Transitions
        overlay.classList.add('fade-out');
        document.body.classList.add('hide-default-cursor');
        layout.classList.add('visible'); // Slide-up fade-in intro animation
        
        setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0, 0, w, h); }, 800);
      });
    })();

    /* ===== CUSTOM CURSOR ===== */
    (function initCursor() {
      const dot = $('#cursorDot');
      let tx = innerWidth / 2, ty = innerHeight / 2, x = tx, y = ty;
      
      const obs = new MutationObserver(() => { 
        if ($('#overlay').classList.contains('fade-out')) dot.style.display = 'block'; 
      });
      obs.observe($('#overlay'), { attributes: true });

      window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; }, { passive: true });
      
      function loop() {
        x += (tx - x) * 0.2; // Smoother lerp
        y += (ty - y) * 0.2;
        dot.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        requestAnimationFrame(loop);
      }
      loop();
    })();

    /* ===== SMOOTH PARALLAX ===== */
    (function initParallax() {
      const card = $('#infoCard');
      const music = $('#musicWrap');
      const avatar = $('#avatar');
      
      let tx = 0, ty = 0, cx = 0, cy = 0;
      
      window.addEventListener('mousemove', e => {
        tx = (e.clientX / innerWidth - 0.5) * 2; 
        ty = (e.clientY / innerHeight - 0.5) * 2;
      }, { passive: true });

      function animateParallax() {
        cx += (tx - cx) * 0.1; // Smooth dampening
        cy += (ty - cy) * 0.1;
        
        if (card) card.style.transform = `perspective(1000px) translate3d(${cx * 15}px, ${cy * 10}px, 0) rotateX(${-cy * 4}deg) rotateY(${cx * 4}deg)`;
        if (music) music.style.transform = `perspective(1000px) translate3d(${cx * 10}px, ${cy * 8}px, 0) rotateX(${-cy * 2}deg) rotateY(${cx * 2}deg)`;
        if (avatar) avatar.style.transform = `translate3d(${cx * 10}px, ${cy * 10}px, 30px) rotate(${cx * 5}deg)`;
        
        requestAnimationFrame(animateParallax);
      }
      animateParallax();
    })();

    /* ===== TYPEWRITER ===== */
    (function initTypewriter() {
      const el = $('#displayName');
      const names = ["Sulav Pariyar"];
      let ci = 0, forward = true;
      
      function step() {
        const cur = names[0];
        if (forward) {
          el.textContent = cur.slice(0, ++ci);
          if (ci >= cur.length) { forward = false; setTimeout(step, 2000); return; }
          setTimeout(step, 100 + Math.random() * 50);
        } else {
          el.textContent = cur.slice(0, --ci);
          if (ci <= 0) { forward = true; setTimeout(step, 500); return; }
          setTimeout(step, 50 + Math.random() * 30);
        }
      }
      step();
    })();

    /* ===== AVATAR PARTICLES ===== */
    (function initAvatarParticles() {
      const canvas = $('#avatarParticles');
      const avatar = $('#avatar');
      if (!canvas || !avatar) return;
      
      const ctx = canvas.getContext('2d');
      let w = canvas.width = avatar.clientWidth;
      let h = canvas.height = avatar.clientHeight;
      
      const particles = Array.from({length: 50}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.5 + 0.5, dx: (Math.random() - 0.5) * 0.8,
        dy: (Math.random() - 0.5) * 0.8, a: Math.random() * 0.6 + 0.2
      }));

      function anim() {
        ctx.clearRect(0, 0, w, h);
        ctx.save();
        ctx.beginPath(); ctx.arc(w/2, h/2, w/2, 0, Math.PI*2); ctx.clip();
        
        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          const distSq = (p.x - w/2)**2 + (p.y - h/2)**2;
          if (distSq > (w/2)**2) {
            const ang = Math.atan2(h/2 - p.y, w/2 - p.x);
            p.x = w/2 + Math.cos(ang) * (w/2 - 2);
            p.y = h/2 + Math.sin(ang) * (h/2 - 2);
          }
          ctx.beginPath();
          ctx.fillStyle = `rgba(167, 139, 250, ${p.a})`;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fill();
        });
        ctx.restore();
        requestAnimationFrame(anim);
      }
      anim();
    })();

    /* ===== MUSIC PLAYER ===== */
    (function initMusic() {
      const audio = $('#audio'), playToggle = $('#playToggle'), playIcon = $('#playIcon');
      const progressFill = $('#progressFill'), progressDot = $('#progressDot'), progressBar = $('#progressBar');
      const currentTime = $('#currentTime'), totalTime = $('#totalTime'), vol = $('#volumeRange');
      const thumb = $('#thumbImg'), skipBack = $('#skipBack'), skipForward = $('#skipForward');

      audio.volume = Number(vol.value);

      const fmt = s => isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

      audio.addEventListener('loadedmetadata', () => totalTime.textContent = fmt(audio.duration));
      
      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        progressDot.style.left = pct + '%';
        currentTime.textContent = fmt(audio.currentTime);
      });

      progressBar.addEventListener('click', e => {
        const rect = progressBar.getBoundingClientRect();
        if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      });

      function setPlaying(on) {
        if (on) {
          playToggle.classList.add('playing');
          playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/>';
        } else {
          playToggle.classList.remove('playing');
          playIcon.innerHTML = '<path d="M5 3v18l15-9L5 3z" fill="currentColor"/>';
        }
      }

      playToggle.addEventListener('click', () => audio.paused ? (audio.play().catch(()=>{}), setPlaying(true)) : (audio.pause(), setPlaying(false)));
      audio.addEventListener('play', () => setPlaying(true));
      audio.addEventListener('pause', () => setPlaying(false));
      audio.addEventListener('ended', () => setPlaying(false));

      vol.addEventListener('input', e => audio.volume = Number(e.target.value));
      thumb.addEventListener('click', () => {
        const url = prompt('Enter thumbnail URL (e.g. assets/new.jpg):', thumb.src);
        if (url) thumb.src = url;
      });

      skipBack.addEventListener('click', () => audio.currentTime = Math.max(0, audio.currentTime - 10));
      skipForward.addEventListener('click', () => audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10));
    })();
  </script>
</body>
